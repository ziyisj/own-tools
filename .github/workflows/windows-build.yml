name: Build Windows App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --name AdsPowerConsole adspower_web.py

      - name: Package starter
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item dist\AdsPowerConsole.exe package\AdsPowerConsole.exe
          @"
          @echo off
          set /p ADSPOWER_API_KEY=Paste AdsPower API Key and press Enter:
          AdsPowerConsole.exe
          "@ | Set-Content -Encoding ASCII package\start.bat
          @"
          Put proxies.txt in this folder if you want to keep a local proxy list.
          Sensitive runtime files are created locally and are not part of the build:
          - proxies.txt
          - mail_accounts.json
          - completed_accounts.txt
          - completed_profiles.json
          "@ | Set-Content -Encoding UTF8 package\README-Windows.txt
          Compress-Archive -Path package\* -DestinationPath AdsPowerConsole-Windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdsPowerConsole-Windows
          path: package

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Windows Build
          body: |
            Latest Windows build from main.

            Download `AdsPowerConsole-Windows.zip`, unzip it, then run `start.bat`.
          files: AdsPowerConsole-Windows.zip
          make_latest: true
          prerelease: false
